<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect: preserves the path for client-side routing
      sessionStorage.setItem('redirect', window.location.pathname + window.location.search + window.location.hash);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
